services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: job_search_agent
      POSTGRES_USER: job_search_agent
      POSTGRES_PASSWORD: job_search_agent
    ports:
      - "55432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U job_search_agent -d job_search_agent"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:

